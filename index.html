<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIM LUÔNG</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f2f5f9;
    text-align:center;
    padding:20px;
}

h1{
    color:#d60000;
    margin-bottom:20px;
    font-size:clamp(20px,4vw,34px);
}

.toolbar{
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:50px;
    padding:12px 24px;
    margin:5px;
    cursor:pointer;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    background:linear-gradient(135deg,#0066ff,#00c6ff);
}

canvas{
    width:700px;
    max-width:95%;
    background:#fff;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    touch-action:none;
}

input[type=file]{
    display:none;
}
</style>

</head>

<body>

<h1>
KÍNH MỜI QUÝ THẦY/CÔ CHỌN ẢNH AVATAR HỌP MẶT KỶ NIỆM 60 NĂM
</h1>

<div class="toolbar">

<input type="file" id="upload" accept="image/*">

<button id="uploadBtn">
📷 Chọn ảnh tải lên
</button>

<button onclick="downloadImage()">
📥 Tải ảnh về
</button>

</div>

<canvas id="canvas" width="1280" height="1280"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const uploadBtn = document.getElementById("uploadBtn");

const frame = new Image();
frame.src = "frame.png";

const photo = new Image();

let loaded = false;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let startX = 0;
let startY = 0;

let pinchStartDistance = 0;
let pinchStartScale = 1;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

const radiusX = 589;
const radiusY = 450;

/* CHỌN ẢNH */

uploadBtn.addEventListener("click", () => {
    upload.click();
});

upload.addEventListener("change", (e) => {

    const file = e.target.files[0];

    if (!file) return;

    const url = URL.createObjectURL(file);

    photo.onload = () => {

        loaded = true;

        scale = Math.max(
            (radiusX * 2) / photo.width,
            (radiusY * 2) / photo.height
        );

        offsetX = 0;
        offsetY = 0;

        draw();

        URL.revokeObjectURL(url);
    };

    photo.src = url;
});

/* VẼ */

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(loaded){

        const w = photo.width * scale;
        const h = photo.height * scale;

        const x =
            centerX - w / 2 + offsetX;

        const y =
            centerY - h / 2 + offsetY;

        ctx.save();

        ctx.beginPath();

        ctx.ellipse(
            centerX,
            centerY,
            radiusX,
            radiusY,
            0,
            0,
            Math.PI * 2
        );

        ctx.clip();

        ctx.drawImage(
            photo,
            x,
            y,
            w,
            h
        );

        ctx.restore();
    }

    if(frame.complete){

        ctx.drawImage(
            frame,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }
}

frame.onload = draw;

/* CHUỘT */

canvas.addEventListener("mousedown",(e)=>{

    dragging = true;

    startX = e.offsetX;
    startY = e.offsetY;
});

canvas.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    const ratio =
        canvas.width /
        canvas.clientWidth;

    offsetX +=
        (e.offsetX - startX) * ratio;

    offsetY +=
        (e.offsetY - startY) * ratio;

    startX = e.offsetX;
    startY = e.offsetY;

    draw();
});

canvas.addEventListener(
    "mouseup",
    ()=> dragging = false
);

canvas.addEventListener(
    "mouseleave",
    ()=> dragging = false
);

/* WHEEL ZOOM */

canvas.addEventListener(
    "wheel",
    (e)=>{

        e.preventDefault();

        scale *=
            e.deltaY < 0
            ? 1.05
            : 0.95;

        scale =
            Math.max(
                0.3,
                Math.min(scale,8)
            );

        draw();
    },
    {passive:false}
);

/* CẢM ỨNG */

function distance(t1,t2){

    return Math.hypot(
        t2.clientX - t1.clientX,
        t2.clientY - t1.clientY
    );
}

canvas.addEventListener(
    "touchstart",
    (e)=>{

        if(e.touches.length===1){

            dragging = true;

            startX =
                e.touches[0].clientX;

            startY =
                e.touches[0].clientY;
        }

        if(e.touches.length===2){

            dragging = false;

            pinchStartDistance =
                distance(
                    e.touches[0],
                    e.touches[1]
                );

            pinchStartScale = scale;
        }

    },
    {passive:false}
);

canvas.addEventListener(
    "touchmove",
    (e)=>{

        e.preventDefault();

        if(
            e.touches.length===1 &&
            dragging
        ){

            const t = e.touches[0];

            offsetX +=
                (t.clientX-startX)*2;

            offsetY +=
                (t.clientY-startY)*2;

            startX = t.clientX;
            startY = t.clientY;

            draw();
        }

        if(e.touches.length===2){

            const d =
                distance(
                    e.touches[0],
                    e.touches[1]
                );

            scale =
                pinchStartScale *
                (d / pinchStartDistance);

            scale =
                Math.max(
                    0.3,
                    Math.min(scale,8)
                );

            draw();
        }

    },
    {passive:false}
);

canvas.addEventListener(
    "touchend",
    ()=> dragging = false
);

/* TẢI ẢNH */

function downloadImage(){

    if(!loaded){

        alert(
            "Vui lòng chọn ảnh trước."
        );

        return;
    }

    const dataURL =
        canvas.toDataURL("image/png");

    const a =
        document.createElement("a");

    a.href = dataURL;
    a.download = "HopMat60Nam.png";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);
}

</script>

</body>
</html>
