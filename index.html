<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const uploadBtn = document.getElementById("uploadBtn");

const frame = new Image();
frame.src = "frame.png";

const photo = new Image();

let loaded = false;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let startX = 0;
let startY = 0;

let pinchStartDistance = 0;
let pinchStartScale = 1;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

const radiusX = 589;
const radiusY = 450;

/* =====================
   LOAD FRAME
===================== */

frame.onload = draw;

frame.onerror = () => {
    alert("Không tìm thấy file frame.png");
};

/* =====================
   CHỌN ẢNH
===================== */

uploadBtn.addEventListener("click", () => {
    upload.click();
});

upload.addEventListener("change", (e) => {

    const file = e.target.files[0];

    if (!file) return;

    const url = URL.createObjectURL(file);

    photo.onload = () => {

        loaded = true;

        scale = Math.max(
            (radiusX * 2) / photo.width,
            (radiusY * 2) / photo.height
        );

        offsetX = 0;
        offsetY = 0;

        draw();

        URL.revokeObjectURL(url);
    };

    photo.src = url;
});

/* =====================
   VẼ
===================== */

function draw() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if (loaded) {

        const w = photo.width * scale;
        const h = photo.height * scale;

        const x =
            centerX - w / 2 + offsetX;

        const y =
            centerY - h / 2 + offsetY;

        ctx.save();

        ctx.beginPath();

        ctx.ellipse(
            centerX,
            centerY,
            radiusX,
            radiusY,
            0,
            0,
            Math.PI * 2
        );

        ctx.clip();

        ctx.drawImage(
            photo,
            x,
            y,
            w,
            h
        );

        ctx.restore();
    }

    if (frame.complete) {

        ctx.drawImage(
            frame,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }
}

/* =====================
   CHUỘT
===================== */

canvas.addEventListener("mousedown", (e) => {

    dragging = true;

    startX = e.offsetX;
    startY = e.offsetY;
});

canvas.addEventListener("mousemove", (e) => {

    if (!dragging) return;

    const ratio =
        canvas.width /
        canvas.clientWidth;

    offsetX +=
        (e.offsetX - startX) * ratio;

    offsetY +=
        (e.offsetY - startY) * ratio;

    startX = e.offsetX;
    startY = e.offsetY;

    draw();
});

canvas.addEventListener(
    "mouseup",
    () => dragging = false
);

canvas.addEventListener(
    "mouseleave",
    () => dragging = false
);

/* =====================
   WHEEL ZOOM
===================== */

canvas.addEventListener(
    "wheel",
    (e) => {

        e.preventDefault();

        if (e.deltaY < 0) {
            scale *= 1.05;
        } else {
            scale *= 0.95;
        }

        scale =
            Math.max(
                0.3,
                Math.min(scale, 8)
            );

        draw();
    },
    { passive: false }
);

/* =====================
   CẢM ỨNG
===================== */

function getDistance(t1, t2) {

    return Math.hypot(
        t2.clientX - t1.clientX,
        t2.clientY - t1.clientY
    );
}

canvas.addEventListener(
    "touchstart",
    (e) => {

        if (e.touches.length === 1) {

            dragging = true;

            startX =
                e.touches[0].clientX;

            startY =
                e.touches[0].clientY;
        }

        else if (
            e.touches.length === 2
        ) {

            dragging = false;

            pinchStartDistance =
                getDistance(
                    e.touches[0],
                    e.touches[1]
                );

            pinchStartScale = scale;
        }

    },
    { passive:false }
);

canvas.addEventListener(
    "touchmove",
    (e) => {

        e.preventDefault();

        if (
            e.touches.length === 1 &&
            dragging
        ) {

            const t = e.touches[0];

            offsetX +=
                (t.clientX - startX) * 2;

            offsetY +=
                (t.clientY - startY) * 2;

            startX = t.clientX;
            startY = t.clientY;

            draw();
        }

        else if (
            e.touches.length === 2
        ) {

            const distance =
                getDistance(
                    e.touches[0],
                    e.touches[1]
                );

            scale =
                pinchStartScale *
                (
                    distance /
                    pinchStartDistance
                );

            scale =
                Math.max(
                    0.3,
                    Math.min(scale, 8)
                );

            draw();
        }

    },
    { passive:false }
);

canvas.addEventListener(
    "touchend",
    () => dragging = false
);

/* =====================
   NÚT ZOOM
===================== */

function zoomIn() {

    scale *= 1.1;

    scale =
        Math.min(scale, 8);

    draw();
}

function zoomOut() {

    scale *= 0.9;

    scale =
        Math.max(scale, 0.3);

    draw();
}

/* =====================
   RESET
===================== */

function resetImage() {

    if (!loaded) return;

    scale = Math.max(
        (radiusX * 2) / photo.width,
        (radiusY * 2) / photo.height
    );

    offsetX = 0;
    offsetY = 0;

    draw();
}

/* =====================
   DOWNLOAD
===================== */

function downloadImage() {

    if (!loaded) {

        alert(
            "Vui lòng chọn ảnh trước."
        );

        return;
    }

    canvas.toBlob(
        function(blob) {

            const url =
                URL.createObjectURL(
                    blob
                );

            const a =
                document.createElement(
                    "a"
                );

            a.href = url;
            a.download =
                "HopMat60Nam.png";

            document.body.appendChild(a);

            a.click();

            document.body.removeChild(a);

            setTimeout(() => {

                URL.revokeObjectURL(
                    url
                );

            }, 2000);

        },
        "image/png"
    );
}
</script>
